<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫码出票 - 海南省演艺集团</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep-blue: #0A1628;
      --deep-blue-light: #122240;
      --deep-blue-lighter: #1A2E4A;
      --coral: #FF6B4A;
      --coral-hover: #E85A3A;
      --gold: #D4A853;
      --emerald: #00C9A7;
      --danger: #EF4444;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.35);
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--deep-blue);
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .kiosk-viewport {
      width: 100vw;
      height: 100vh;
      aspect-ratio: 16 / 9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        radial-gradient(ellipse 80% 60% at 50% 45%, rgba(18, 34, 64, 0.9) 0%, transparent 100%),
        linear-gradient(175deg, #0A1628 0%, #0D1B30 35%, #0F2035 65%, #0A1628 100%);
      overflow: hidden;
    }

    /* ========== Header ========== */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 9vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4vw;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(10, 22, 40, 0.8) 0%, transparent 100%);
    }

    .header__brand {
      display: flex;
      align-items: center;
      gap: 1vw;
    }

    .header__logo {
      width: 4vh;
      height: 4vh;
      object-fit: contain;
    }

    .header__title {
      font-size: clamp(14px, 1.8vh, 20px);
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.15em;
    }

    .header__back {
      position: fixed;
      bottom: 3vh;
      left: 3vw;
      display: flex;
      align-items: center;
      gap: 0.6vw;
      padding: 1.2vh 2.2vw;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      font-size: clamp(13px, 1.5vh, 17px);
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .header__back:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .header__back svg {
      width: 1.6vh;
      height: 1.6vh;
    }

    /* ========== Scan Content ========== */
    .scan-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 12vh 5vw 6vh;
      animation: contentEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes contentEnter {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== Scan Frame ========== */
    .scan-frame {
      position: relative;
      width: clamp(200px, 28vh, 320px);
      height: clamp(200px, 28vh, 320px);
      margin-bottom: 4vh;
    }

    .scan-frame__inner {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.02);
      overflow: hidden;
    }

    /* Corner brackets */
    .scan-frame__corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--coral);
      border-style: solid;
      z-index: 2;
    }

    .scan-frame__corner--tl {
      top: -1px; left: -1px;
      border-width: 4px 0 0 4px;
      border-top-left-radius: 20px;
    }

    .scan-frame__corner--tr {
      top: -1px; right: -1px;
      border-width: 4px 4px 0 0;
      border-top-right-radius: 20px;
    }

    .scan-frame__corner--bl {
      bottom: -1px; left: -1px;
      border-width: 0 0 4px 4px;
      border-bottom-left-radius: 20px;
    }

    .scan-frame__corner--br {
      bottom: -1px; right: -1px;
      border-width: 0 4px 4px 0;
      border-bottom-right-radius: 20px;
    }

    /* Scan line */
    .scan-line {
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--coral), transparent);
      box-shadow: 0 0 12px var(--coral-glow), 0 0 40px rgba(255, 107, 74, 0.2);
      animation: scanMove 2.5s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes scanMove {
      0%, 100% { top: 10%; opacity: 0.6; }
      50% { top: 90%; opacity: 1; }
    }

    /* QR icon inside frame */
    .scan-frame__icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.15;
    }

    .scan-frame__icon svg {
      width: 50%;
      height: 50%;
      fill: var(--text-primary);
    }

    /* ========== Instruction Text ========== */
    .scan-instruction {
      text-align: center;
      margin-bottom: 3vh;
    }

    .scan-instruction__title {
      font-size: clamp(20px, 2.8vh, 32px);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.15em;
      margin-bottom: 1.2vh;
    }

    .scan-instruction__subtitle {
      font-size: clamp(13px, 1.6vh, 18px);
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      line-height: 1.6;
    }

    /* ========== Manual Input Button ========== */
    .manual-btn {
      display: flex;
      align-items: center;
      gap: 0.8vw;
      padding: 1.2vh 2.5vw;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-secondary);
      font-size: clamp(13px, 1.5vh, 17px);
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 400;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .manual-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .manual-btn svg {
      width: 1.6vh;
      height: 1.6vh;
      fill: currentColor;
    }

    /* ========== Result Overlay ========== */
    .result-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 22, 40, 0.92);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .result-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .result-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5vh;
      padding: 5vh 6vw;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(18, 34, 64, 0.95) 0%, rgba(10, 22, 40, 0.98) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      text-align: center;
      min-width: clamp(300px, 40vw, 500px);
      animation: cardEnter 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .result-card__icon {
      width: clamp(60px, 8vh, 80px);
      height: clamp(60px, 8vh, 80px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-card__icon--success {
      background: linear-gradient(135deg, rgba(0, 201, 167, 0.15), rgba(0, 201, 167, 0.05));
      border: 2px solid rgba(0, 201, 167, 0.3);
    }

    .result-card__icon--fail {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05));
      border: 2px solid rgba(239, 68, 68, 0.3);
    }

    .result-card__icon svg {
      width: 50%;
      height: 50%;
    }

    .result-card__title {
      font-size: clamp(22px, 3vh, 32px);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .result-card__title--success { color: var(--emerald); }
    .result-card__title--fail { color: var(--danger); }

    .result-card__detail {
      font-size: clamp(13px, 1.6vh, 18px);
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 360px;
    }

    .result-card__action {
      margin-top: 1vh;
      padding: 1.5vh 4vw;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--coral), var(--coral-hover));
      color: #fff;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(14px, 1.8vh, 20px);
      font-weight: 500;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 20px rgba(255, 107, 74, 0.3);
    }

    .result-card__action:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(255, 107, 74, 0.4);
    }

    .result-card__action:active {
      transform: translateY(0);
    }

    /* ========== Demo Controls (for testing) ========== */
    .demo-controls {
      position: absolute;
      bottom: 3vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1vw;
      z-index: 5;
    }

    .demo-btn {
      padding: 0.8vh 1.5vw;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      font-size: clamp(10px, 1.1vh, 12px);
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .demo-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="kiosk-viewport">

    <!-- Header -->
    <div class="header">
      <div class="header__brand">
        <img class="header__logo" src="logo.png" alt="海南省演艺集团">
        <span class="header__title">自助出票</span>
      </div>
    </div>

    <!-- Scan Content -->
    <div class="scan-content">

      <!-- Scan Frame -->
      <div class="scan-frame">
        <div class="scan-frame__inner">
          <div class="scan-frame__icon">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 12h8V4H4v8zm4-4v4H6V8h2zM4 44h8v-8H4v8zm4-4v4H6v-4h2zM44 4h-8v8h8V4zm-4 4v4h2V8h-2zM36 36h8v-8h-8v8zm4-4v4h-2v-4h2zM16 16h4v4h-4zM24 16h4v4h-4zM32 16h4v4h-4zM16 24h4v4h-4zM24 24h4v4h-4zM32 24h4v4h-4zM16 32h4v4h-4zM24 32h4v4h-4zM32 32h4v4h-4z"/>
            </svg>
          </div>
          <div class="scan-line"></div>
        </div>
        <div class="scan-frame__corner scan-frame__corner--tl"></div>
        <div class="scan-frame__corner scan-frame__corner--tr"></div>
        <div class="scan-frame__corner scan-frame__corner--bl"></div>
        <div class="scan-frame__corner scan-frame__corner--br"></div>
      </div>

      <!-- Instruction -->
      <div class="scan-instruction">
        <div class="scan-instruction__title">请出示门票二维码</div>
        <div class="scan-instruction__subtitle">
          将手机上的电子票二维码对准屏幕中央扫描区域<br>
          或出示纸质票上的二维码
        </div>
      </div>

      <!-- Manual Input -->
      <button class="manual-btn" onclick="showResult('fail')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        手动输入取票码
      </button>

    </div>

    <!-- Back Button (bottom-left) -->
    <a class="header__back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      返回首页
    </a>

    <!-- Demo Controls -->
    <div class="demo-controls">
      <button class="demo-btn" onclick="showResult('success')">模拟：出票成功</button>
      <button class="demo-btn" onclick="showResult('fail')">模拟：出票失败</button>
    </div>

  </div>

  <!-- Result Overlay -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card" id="resultCard">
      <!-- Content injected by JS -->
    </div>
  </div>

  <script>
    function showResult(type) {
      const overlay = document.getElementById('resultOverlay');
      const card = document.getElementById('resultCard');

      if (type === 'success') {
        card.innerHTML = `
          <div class="result-card__icon result-card__icon--success">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00C9A7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
          <div class="result-card__title result-card__title--success">出票成功</div>
          <div class="result-card__detail">
            您的门票已成功打印<br>
            请从下方取票口取走纸质票券
          </div>
          <button class="result-card__action" onclick="hideResult()">完成</button>
        `;
      } else {
        card.innerHTML = `
          <div class="result-card__icon result-card__icon--fail">
            <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
          </div>
          <div class="result-card__title result-card__title--fail">出票失败</div>
          <div class="result-card__detail">
            无法识别该二维码，请确认：<br>
            1. 二维码是否清晰完整<br>
            2. 是否为当前场次的有效门票<br>
            3. 或尝试手动输入取票码
          </div>
          <button class="result-card__action" onclick="hideResult()">重新尝试</button>
        `;
      }

      overlay.classList.add('active');

      // Auto-hide after 8 seconds
      setTimeout(() => {
        if (overlay.classList.contains('active')) {
          hideResult();
        }
      }, 8000);
    }

    function hideResult() {
      document.getElementById('resultOverlay').classList.remove('active');
    }
  </script>

</body>
</html>
